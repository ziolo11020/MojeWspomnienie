<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ważny komunikat</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #101522, #1d263b);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      max-width: 520px;
      margin: 20px;
      padding: 28px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }

    h1 { margin-top: 0; font-size: 2rem; }
    p { line-height: 1.6; opacity: 0.95; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .modal {
      width: 100%;
      max-width: 480px;
      background: #1f1f1f;
      border: 2px solid #ff4d4d;
      border-radius: 18px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    .modal-header {
      background: #b30000;
      padding: 16px 20px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .modal-body { padding: 24px 20px; }

    .warning { font-size: 3rem; margin-bottom: 10px; }

    .joke {
      display: none;
      font-size: 1.4rem;
      margin-top: 10px;
      color: #00ffcc;
      font-weight: bold;
    }

    .countdown {
      margin-top: 10px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">⚠️ Ostrzeżenie bezpieczeństwa</div>
    <div class="modal-body">
      <div class="warning">🚨</div>
      <strong>Polecam sprawdzić konto bankowe.</strong>
      <p>Wykryto podejrzaną aktywność.</p>

      <div class="countdown" id="countdown">Nie możesz zamknąć strony przez 10s...</div>
      <div class="joke" id="joke">Prima Aprilis 😄</div>
    </div>
  </div>
</div>

<script>
  let seconds = 10;

  // blokada zamykania (na ile się da w przeglądarce)
  window.onbeforeunload = function () {
    if (seconds > 0) {
      return "Na pewno chcesz zamknąć?";
    }
  };

  const countdownEl = document.getElementById('countdown');
  const jokeEl = document.getElementById('joke');

  let jokeShown = false;

  const interval = setInterval(() => {
    seconds--;
    countdownEl.textContent = `Nie możesz zamknąć strony przez ${seconds}s...`;

    if (seconds <= 5 && !jokeShown) {
      jokeEl.style.display = 'block';
      jokeShown = true;
    }

    if (seconds <= 0) {
      clearInterval(interval);
      countdownEl.textContent = "Możesz już zamknąć 😄";
    }
  }, 1000);

  // pierwszy straszak
  setTimeout(() => {
    alert('Polecam sprawdzić konto bankowe');
  }, 300);
</script>

</body>
</html>
