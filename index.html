<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ważny komunikat</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #101522, #1d263b);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .modal {
      width: 100%;
      max-width: 480px;
      background: #1f1f1f;
      border: 2px solid #ff4d4d;
      border-radius: 18px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    .modal-header {
      background: #b30000;
      padding: 16px 20px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .modal-body {
      padding: 24px 20px;
      text-align: center;
    }

    .warning {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .joke-screen {
      display: none;
      text-align: center;
    }

    .joke-screen h1 {
      font-size: 2.5rem;
      color: #00ffcc;
    }

    button {
      margin-top: 20px;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 1rem;
      cursor: pointer;
      background: #ff4d4d;
      color: white;
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">⚠️ Ostrzeżenie bezpieczeństwa</div>
    <div class="modal-body">
      <div class="warning">🚨</div>
      <strong>Polecam sprawdzić konto bankowe.</strong>
      <p>Wykryto podejrzaną aktywność.</p>
      <button onclick="showJoke()">OK</button>
    </div>
  </div>
</div>

<div class="joke-screen" id="joke">
  <h1>Prima Aprilis 😄</h1>
  <p>To tylko żart! Następnym razem uważaj w co klikasz 😉</p>
</div>

<script>
  function showJoke() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('joke').style.display = 'block';
    document.title = 'Prima Aprilis 😄';
  }

  // pierwszy straszak
  setTimeout(() => {
    alert('Polecam sprawdzić konto bankowe');
  }, 300);
</script>

</body>
</html>
